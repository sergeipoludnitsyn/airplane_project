{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<div class="container" style="max-width: 400px; margin: 100px auto;">
    <h2>Вход в систему</h2>
    
    {% if form.errors %}
        <p style="color: red;">Неверное имя пользователя или пароль.</p>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>
    
    <p style="margin-top: 20px;">
        <a href="{% url 'airplane_list' %}">← Вернуться в каталог</a>
    </p>
</div>
</body>
</html>
