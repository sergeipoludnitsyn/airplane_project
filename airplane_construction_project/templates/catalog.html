<!-- templates/airplane_list.html -->
{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Комплектация самолета</title>
    <link rel="stylesheet" href="{% static 'css/catalog.css' %}">
</head>
<body>

<div class="container">
    <header>
        <a href="{% url 'catalog' %}" class="logo-link">
            <img class="logo" src="{% static 'images/logo.jpg' %}" alt="Логотип">
        </a>
        <h1>Комплектация самолета</h1>
    </header>
    
    <!-- Форма поиска без JavaScript -->
    <form method="GET" action="{% url 'catalog' %}" class="search-container">
        <input 
            type="text" 
            name="search_product" 
            class="search-input" 
            placeholder="Поиск товаров..." 
            value="{{ search_query|default:'' }}"
        >
        <button type="submit" class="search-button">🔍</button>
        <div style="display: inline-flex; align-items: center; gap: 5px; position: relative;">
            <a href="{% url 'application_page' %}" class="order-button">
                <img src="{% static 'images/button.jpg' %}" alt="Корзина">
            </a>
            <span style="
                background-color: red; 
                color: white; 
                border-radius: 50%; 
                padding: 2px 6px; 
                font-size: 12px; 
                font-weight: bold;
                position: absolute;
                top: -10px;
                right: -10px;
            ">3</span>
        </div>
    </form>
    
    <!-- Карточки товаров -->
    <div class="products-grid">
        {% for product in products %}
            <div class="product-card">
                <a href="{% url 'airplane_product' product.id %}" class="product-link">
                    {% if product.image_url %}
                        <!-- Используем image_url для MinIO -->
                        <img class="product-image" src="{{ product.image_url }}" alt="{{ product.title }}">
                    {% else %}
                        <!-- Fallback на статику -->
                        <img class="product-image" src="{% static product.image %}" alt="{{ product.title }}">
                    {% endif %}
                    <div class="product-info">
                        <div class="product-title">{{ product.title }}</div>
                        <div class="product-price">{{ product.price }}</div>
                    </div>
                </a>
            </div>
        {% empty %}
            <div class="no-products">
                <p>По вашему запросу "{{ search_query }}" ничего не найдено.</p>
                <p><a href="{% url 'catalog' %}" class="back-to-catalog">Вернуться к каталогу</a></p>
            </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
